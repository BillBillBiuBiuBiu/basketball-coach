<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>比赛分析台</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .tab-btn.active { background: #f97316; color: white; }
  video::-webkit-media-controls { display: flex !important; }
  .severity-high { border-left: 3px solid #ef4444; }
  .severity-medium { border-left: 3px solid #f97316; }
  .severity-low { border-left: 3px solid #6b7280; }
  .phase-badge { font-size: 0.7rem; padding: 2px 7px; border-radius: 4px; }
  .player-chip { cursor: pointer; user-select: none; }
  .player-chip.selected { background: #f97316; color: white; border-color: #f97316; }
</style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

<!-- Header -->
<div class="border-b border-gray-800 px-5 py-3 flex items-center gap-3">
  <a href="/" class="text-gray-400 hover:text-white text-sm">← 返回</a>
  <span class="text-gray-600">|</span>
  <span id="gameTitle" class="font-semibold">加载中...</span>
</div>

<div class="flex h-[calc(100vh-49px)]">

  <!-- LEFT: Video + marking -->
  <div class="flex-1 flex flex-col min-w-0 border-r border-gray-800">

    <!-- Video area -->
    <div class="bg-black flex-shrink-0">
      <div id="videoPlaceholder" class="flex items-center justify-center h-48 text-gray-500 text-sm">
        <div class="text-center">
          <div class="text-3xl mb-2">🎬</div>
          <label class="cursor-pointer bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg text-sm inline-block">
            上传比赛视频
            <input type="file" accept="video/*" class="hidden" onchange="uploadVideo(this)">
          </label>
        </div>
      </div>
      <video id="videoPlayer" class="hidden w-full max-h-56" controls preload="metadata">
        Your browser does not support video.
      </video>
    </div>

    <!-- Marking controls -->
    <div class="px-4 py-3 border-b border-gray-800 bg-gray-900 flex items-center gap-3 flex-shrink-0">
      <div class="flex items-center gap-2">
        <button id="btnMarkStart" onclick="markStart()"
          class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1.5 rounded text-xs font-medium disabled:opacity-40"
          disabled>
          ▶ 标记开始
        </button>
        <span id="startDisplay" class="text-orange-400 text-xs font-mono w-14 text-center">--:--</span>
        <span class="text-gray-600 text-xs">→</span>
        <button id="btnMarkEnd" onclick="markEnd()"
          class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1.5 rounded text-xs font-medium disabled:opacity-40"
          disabled>
          ⏹ 标记结束
        </button>
        <span id="endDisplay" class="text-orange-400 text-xs font-mono w-14 text-center">--:--</span>
      </div>
      <button id="btnSaveRound" onclick="showSaveDialog()"
        class="ml-auto bg-orange-500 hover:bg-orange-600 text-white px-3 py-1.5 rounded text-xs font-medium disabled:opacity-40"
        disabled>
        保存回合 →
      </button>
    </div>

    <!-- Roster bar -->
    <div id="rosterBar" class="px-4 py-2 border-b border-gray-800 bg-gray-900/50 flex-shrink-0">
      <div id="rosterDisplay" class="flex items-center gap-2 flex-wrap">
        <span class="text-gray-500 text-xs">球员名单：</span>
        <span id="rosterChips" class="flex flex-wrap gap-1"></span>
        <button onclick="showRosterEditor()" class="text-xs text-gray-500 hover:text-orange-400 border border-gray-700 rounded px-2 py-0.5" id="btnEditRoster">
          + 设置名单
        </button>
      </div>
      <!-- Roster editor (inline) -->
      <div id="rosterEditor" class="hidden mt-2 flex items-center gap-2">
        <input id="rosterInput" type="text" placeholder="输入球员名，逗号或回车分隔"
          class="flex-1 bg-gray-800 border border-gray-600 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-orange-500"
          onkeydown="handleRosterKey(event)">
        <button onclick="saveRoster()" class="bg-orange-500 hover:bg-orange-600 text-white px-3 py-1.5 rounded text-xs">保存</button>
        <button onclick="hideRosterEditor()" class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1.5 rounded text-xs">取消</button>
      </div>
    </div>

    <!-- Possession list (scrollable) -->
    <div class="flex-1 overflow-y-auto px-4 py-3 space-y-2" id="possessionList">
      <p class="text-gray-600 text-xs text-center py-8">标记视频中的攻防回合后，点击"保存回合"添加</p>
    </div>
  </div>

  <!-- RIGHT: Analysis panel -->
  <div class="w-96 flex-shrink-0 overflow-y-auto" id="analysisPanel">
    <div class="p-5 text-gray-500 text-sm text-center mt-10">
      保存回合后自动分析<br>点击左侧已分析回合查看结果
    </div>
  </div>

</div>

<!-- Save round dialog (minimal) -->
<div id="saveDialog" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div class="bg-gray-900 border border-gray-700 rounded-xl p-5 w-96">
    <h3 class="font-semibold mb-1">保存回合</h3>
    <p id="dTimeRange" class="text-gray-400 text-xs font-mono mb-4"></p>

    <!-- Player selection (only shown if roster exists) -->
    <div id="dPlayerSection" class="hidden mb-4">
      <label class="text-gray-400 text-xs mb-2 block">涉及球员（可多选）</label>
      <div id="dPlayerChips" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- Optional note -->
    <div class="mb-4">
      <label class="text-gray-400 text-xs mb-1 block">教练备注（可选）</label>
      <input id="dDesc" type="text" placeholder="记录你观察到的关键问题..."
        class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-500">
    </div>

    <div class="flex gap-2">
      <button onclick="savePossession()" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white py-2 rounded-lg text-sm font-medium">保存并分析</button>
      <button onclick="hideDialog()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white py-2 rounded-lg text-sm">取消</button>
    </div>
  </div>
</div>

<script>
const gameId = location.pathname.split('/').pop();
const video = document.getElementById('videoPlayer');
let markStartTime = null, markEndTime = null;
let possessions = [];
let homeRoster = [];  // player names for this game

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const res = await fetch(`/api/games/${gameId}`);
  const game = await res.json();
  document.getElementById('gameTitle').textContent = game.title;
  document.title = game.title + ' — 比赛分析台';

  homeRoster = game.home_players || [];
  renderRoster();

  if (game.has_video) loadVideo();
  possessions = game.possessions || [];
  renderPossessions();

  // resume polling for any in-progress analyses
  possessions.filter(p => p.analysis_status === 'analyzing').forEach(p => pollAnalysis(p.id));
}

function loadVideo() {
  document.getElementById('videoPlaceholder').classList.add('hidden');
  const player = document.getElementById('videoPlayer');
  player.src = `/api/games/${gameId}/video`;
  player.classList.remove('hidden');
  document.getElementById('btnMarkStart').disabled = false;
}

async function uploadVideo(input) {
  const file = input.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  input.closest('label').textContent = '上传中...';
  const res = await fetch(`/api/games/${gameId}/video`, {method: 'POST', body: fd});
  if (res.ok) loadVideo();
}

// ── Roster ────────────────────────────────────────────────────────────────────
function renderRoster() {
  const chips = document.getElementById('rosterChips');
  chips.innerHTML = homeRoster.map(name =>
    `<span class="text-xs bg-gray-700 text-gray-300 rounded px-2 py-0.5">${name}</span>`
  ).join('');
  document.getElementById('btnEditRoster').textContent = homeRoster.length ? '编辑' : '+ 设置名单';
}

function showRosterEditor() {
  document.getElementById('rosterInput').value = homeRoster.join(', ');
  document.getElementById('rosterEditor').classList.remove('hidden');
  document.getElementById('rosterInput').focus();
}

function hideRosterEditor() {
  document.getElementById('rosterEditor').classList.add('hidden');
}

function handleRosterKey(e) {
  if (e.key === 'Enter') saveRoster();
}

async function saveRoster() {
  const val = document.getElementById('rosterInput').value;
  const players = val.split(/[,，]/).map(s => s.trim()).filter(Boolean);
  const res = await fetch(`/api/games/${gameId}/roster`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({players}),
  });
  if (res.ok) {
    homeRoster = players;
    renderRoster();
    hideRosterEditor();
  }
}

// ── Marking ───────────────────────────────────────────────────────────────────
function fmtTime(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function markStart() {
  markStartTime = video.currentTime;
  markEndTime = null;
  document.getElementById('startDisplay').textContent = fmtTime(markStartTime);
  document.getElementById('startDisplay').style.color = '';
  document.getElementById('endDisplay').textContent = '--:--';
  document.getElementById('btnMarkEnd').disabled = false;
  document.getElementById('btnSaveRound').disabled = true;
}

function markEnd() {
  if (video.currentTime <= markStartTime) {
    document.getElementById('endDisplay').style.color = '#ef4444';
    document.getElementById('endDisplay').textContent = '! 需晚于开始';
    return;
  }
  markEndTime = video.currentTime;
  document.getElementById('endDisplay').style.color = '';
  document.getElementById('endDisplay').textContent = fmtTime(markEndTime);
  document.getElementById('btnSaveRound').disabled = false;
}

// ── Save dialog ───────────────────────────────────────────────────────────────
function showSaveDialog() {
  if (markStartTime === null || markEndTime === null) return;
  const dur = Math.round(markEndTime - markStartTime);
  document.getElementById('dTimeRange').textContent =
    `${fmtTime(markStartTime)} → ${fmtTime(markEndTime)}（${dur}秒）`;
  document.getElementById('dDesc').value = '';

  // Build player checkboxes
  const section = document.getElementById('dPlayerSection');
  const chips = document.getElementById('dPlayerChips');
  if (homeRoster.length) {
    chips.innerHTML = homeRoster.map(name =>
      `<button type="button" class="player-chip text-xs border border-gray-600 text-gray-300 rounded-full px-3 py-1"
        onclick="togglePlayer(this)">${name}</button>`
    ).join('');
    section.classList.remove('hidden');
  } else {
    section.classList.add('hidden');
  }

  document.getElementById('saveDialog').classList.remove('hidden');
}

function hideDialog() {
  document.getElementById('saveDialog').classList.add('hidden');
}

function togglePlayer(btn) {
  btn.classList.toggle('selected');
}

async function savePossession() {
  const players = [...document.querySelectorAll('#dPlayerChips .player-chip.selected')]
    .map(b => b.textContent);
  const body = {
    start_time: markStartTime,
    end_time: markEndTime,
    players,
    description: document.getElementById('dDesc').value.trim(),
  };
  const res = await fetch(`/api/games/${gameId}/possessions`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  if (res.ok) {
    const p = await res.json();
    possessions.push(p);
    renderPossessions();
    hideDialog();
    markStartTime = markEndTime = null;
    document.getElementById('startDisplay').textContent = '--:--';
    document.getElementById('endDisplay').textContent = '--:--';
    document.getElementById('btnMarkEnd').disabled = true;
    document.getElementById('btnSaveRound').disabled = true;
    // auto-trigger analysis immediately
    triggerAnalysis(p.id);
  }
}

// ── Possession list ───────────────────────────────────────────────────────────
const PHASE_LABEL = {
  offense: '进攻', defense: '防守',
  transition_offense: '快攻', transition_defense: '退防'
};
const PHASE_COLOR = {
  offense: 'bg-blue-900 text-blue-300',
  defense: 'bg-red-900 text-red-300',
  transition_offense: 'bg-green-900 text-green-300',
  transition_defense: 'bg-yellow-900 text-yellow-300',
};

function renderPossessions() {
  const el = document.getElementById('possessionList');
  if (!possessions.length) {
    el.innerHTML = '<p class="text-gray-600 text-xs text-center py-8">标记视频中的攻防回合后，点击"保存回合"添加</p>';
    return;
  }
  el.innerHTML = possessions.map(p => {
    const isDone = p.analysis_status === 'done';
    const isAnalyzing = p.analysis_status === 'analyzing';
    const isError = p.analysis_status === 'error';

    const statusBadge = isDone
      ? '<span class="text-xs text-green-400">✓ 已分析</span>'
      : isAnalyzing
      ? '<span class="text-xs text-orange-400 animate-pulse">AI分析中...</span>'
      : isError
      ? '<span class="text-xs text-red-400">分析失败</span>'
      : '<span class="text-xs text-gray-600">待分析</span>';

    // Use AI-determined title if available, else show time range
    const displayTitle = (p.title && p.title !== '') ? p.title
      : `回合 ${fmtTime(p.start_time)} – ${fmtTime(p.end_time)}`;

    const phaseBadge = p.phase
      ? `<span class="phase-badge ${PHASE_COLOR[p.phase] || 'bg-gray-700 text-gray-300'}">${PHASE_LABEL[p.phase] || p.phase}</span>`
      : '';
    const resultBadge = p.result ? `<span class="text-gray-400 text-xs">${p.result}</span>` : '';

    return `
      <div class="bg-gray-900 border border-gray-800 rounded-lg p-3 hover:border-gray-600 transition-colors cursor-pointer"
           onclick="${isDone ? `showAnalysis(${p.id})` : ''}">
        <div class="flex items-start justify-between gap-2">
          <div class="min-w-0 flex-1">
            <div class="text-sm font-medium truncate">${displayTitle}</div>
            <div class="flex items-center gap-2 mt-1 flex-wrap">
              ${phaseBadge}
              <span class="text-gray-500 text-xs font-mono">${fmtTime(p.start_time)} – ${fmtTime(p.end_time)}</span>
              ${resultBadge}
            </div>
            ${p.players && p.players.length ? `<div class="text-gray-500 text-xs mt-1">球员：${p.players.join('、')}</div>` : ''}
          </div>
          <div class="flex-shrink-0 flex flex-col items-end gap-1">
            ${statusBadge}
            <div class="flex gap-1" onclick="event.stopPropagation()">
              <button onclick="seekTo(${p.start_time})" class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded">▶</button>
              ${isDone || isError ? `<button onclick="triggerAnalysis(${p.id})" class="text-xs bg-gray-700 hover:bg-orange-600 px-2 py-1 rounded">重析</button>` : ''}
              <button onclick="deletePossession(${p.id})" class="text-xs bg-gray-700 hover:bg-red-800 px-2 py-1 rounded">✕</button>
            </div>
          </div>
        </div>
        ${isError ? `<div class="mt-1 text-xs text-red-400">${p.analysis_error || '分析失败'}</div>` : ''}
      </div>
    `;
  }).join('');
}

function seekTo(t) {
  video.currentTime = t;
  video.play();
}

async function triggerAnalysis(id) {
  const res = await fetch(`/api/games/${gameId}/possessions/${id}/analyze`, {method: 'POST'});
  if (res.ok) {
    const p = possessions.find(x => x.id === id);
    if (p) { p.analysis_status = 'analyzing'; p.title = p.title || ''; }
    renderPossessions();
    pollAnalysis(id);
  }
}

function pollAnalysis(id) {
  const interval = setInterval(async () => {
    const res = await fetch(`/api/games/${gameId}/possessions/${id}`);
    const p = await res.json();
    const idx = possessions.findIndex(x => x.id === id);
    if (idx >= 0) possessions[idx] = p;
    renderPossessions();
    if (p.analysis_status !== 'analyzing') {
      clearInterval(interval);
      if (p.analysis_status === 'done') showAnalysis(id);
    }
  }, 2000);
}

async function deletePossession(id) {
  if (!confirm('确认删除这个回合？')) return;
  await fetch(`/api/games/${gameId}/possessions/${id}`, {method: 'DELETE'});
  possessions = possessions.filter(p => p.id !== id);
  renderPossessions();
}

// ── Analysis panel ────────────────────────────────────────────────────────────
const SEV_CLASS = { high: 'severity-high', medium: 'severity-medium', low: 'severity-low' };
const SEV_LABEL = { high: '严重', medium: '一般', low: '轻微' };
const SEV_COLOR = { high: 'text-red-400', medium: 'text-orange-400', low: 'text-gray-400' };

function showAnalysis(id) {
  const p = possessions.find(x => x.id === id);
  if (!p || !p.analysis) return;
  const a = p.analysis;
  const panel = document.getElementById('analysisPanel');

  const errorsHtml = (a.errors || []).length
    ? (a.errors || []).map(e => `
        <div class="bg-gray-800 ${SEV_CLASS[a.severity] || ''} rounded-lg p-3 mb-2">
          <div class="flex items-center gap-2 mb-1">
            <span class="font-medium text-sm">${e.player || '未知'}</span>
            <span class="text-xs bg-gray-700 text-gray-300 px-2 py-0.5 rounded">${e.error_label || e.error_type}</span>
          </div>
          <div class="text-sm text-gray-300">${e.description}</div>
        </div>
      `).join('')
    : '<p class="text-gray-500 text-xs">未识别到明显错误</p>';

  const drill = a.training_drill || {};

  panel.innerHTML = `
    <div class="p-4 border-b border-gray-800">
      <div class="flex items-center justify-between mb-1">
        <span class="text-sm font-semibold">${p.title || '回合分析'}</span>
        <span class="text-xs ${SEV_COLOR[a.severity] || 'text-gray-400'}">${SEV_LABEL[a.severity] || ''}</span>
      </div>
      <div class="flex items-center gap-2 mt-1">
        ${p.phase ? `<span class="phase-badge ${PHASE_COLOR[p.phase] || 'bg-gray-700 text-gray-300'}">${PHASE_LABEL[p.phase] || p.phase}</span>` : ''}
        <span class="text-xs text-gray-500 font-mono">${fmtTime(p.start_time)} – ${fmtTime(p.end_time)}</span>
        ${p.result ? `<span class="text-xs text-gray-400">${p.result}</span>` : ''}
      </div>
      ${p.players && p.players.length ? `<div class="text-xs text-gray-500 mt-1">球员：${p.players.join('、')}</div>` : ''}
    </div>

    <div class="p-4 space-y-4">
      <div>
        <div class="text-xs text-gray-400 uppercase tracking-wide mb-1.5">回合描述</div>
        <p class="text-sm text-gray-300 leading-relaxed">${a.tactical_summary || '--'}</p>
      </div>

      <div>
        <div class="text-xs text-gray-400 uppercase tracking-wide mb-2">识别到的问题</div>
        ${errorsHtml}
      </div>

      ${a.root_cause ? `
      <div>
        <div class="text-xs text-gray-400 uppercase tracking-wide mb-1.5">根本原因</div>
        <p class="text-sm text-orange-300">${a.root_cause}</p>
      </div>
      ` : ''}

      <div class="bg-gray-800 rounded-xl p-4">
        <div class="text-xs text-gray-400 uppercase tracking-wide mb-2">训练建议</div>
        <div class="font-semibold text-sm mb-1.5">${drill.name || '--'}</div>
        <p class="text-sm text-gray-300 leading-relaxed mb-3">${drill.description || '--'}</p>
        <div class="flex gap-3 text-xs text-gray-400">
          ${drill.duration ? `<span>⏱ ${drill.duration}</span>` : ''}
          ${drill.focus ? `<span>🎯 ${drill.focus}</span>` : ''}
        </div>
      </div>
    </div>
  `;
}

init();
</script>
</body>
</html>
